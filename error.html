<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <title>404 Not Found - Jobseeker</title>
</head>

<body class="bg-slate-100 text-slate-800 font-sans antialiased min-h-screen">

  <!-- HEADER -->
  <header class="bg-slate-950 border-b border-slate-800 shadow-lg">

    <div class="container mx-auto max-w-7xl px-6 py-4 flex justify-between items-center">

      <h1 class="text-3xl font-black tracking-tight">
        <a href="index.html"
          class="text-indigo-400 hover:text-indigo-300 transition">
          Jobseeker
        </a>
      </h1>

      <nav class="flex items-center gap-4 text-sm font-medium">

        <a href="login.html"
          class="text-slate-300 hover:text-white transition">
          Login
        </a>

        <a href="register.html"
          class="text-slate-300 hover:text-white transition">
          Register
        </a>

        <a href="post-job.html"
          class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl shadow-md transition">
          <i class="fa fa-plus-circle mr-1"></i>
          Post Job
        </a>

      </nav>

    </div>

  </header>

  <!-- HERO ERROR SECTION -->
  <section
    class="relative overflow-hidden flex items-center justify-center min-h-[90vh] bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 px-6">

    <!-- BACKGROUND GLOW -->
    <div
      class="absolute top-0 left-0 w-96 h-96 bg-indigo-500/20 rounded-full blur-3xl">
    </div>

    <div
      class="absolute bottom-0 right-0 w-96 h-96 bg-indigo-400/10 rounded-full blur-3xl">
    </div>

    <!-- ERROR CARD -->
    <div
      class="relative z-10 bg-white/95 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl max-w-2xl w-full p-12 text-center">

      <!-- ICON -->
      <div
        class="w-28 h-28 mx-auto rounded-full bg-indigo-100 border border-indigo-200 flex items-center justify-center mb-8">

        <i class="fa fa-triangle-exclamation text-5xl text-indigo-600"></i>

      </div>

      <!-- ERROR NUMBER -->
      <h1
        class="text-8xl font-black bg-gradient-to-r from-indigo-500 to-indigo-700 bg-clip-text text-transparent tracking-tight">

        404

      </h1>

      <!-- TITLE -->
      <h2 class="text-3xl font-bold text-slate-900 mt-4">
        Page Not Found
      </h2>

      <!-- DESCRIPTION -->
      <p class="text-slate-600 text-lg mt-4 leading-relaxed max-w-xl mx-auto">
        The page you are looking for may have been removed,
        renamed, or is temporarily unavailable.
      </p>

      <!-- BUTTONS -->
      <div
        class="flex flex-col sm:flex-row items-center justify-center gap-4 mt-10">

        <a href="index.html"
          class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-8 py-3 rounded-2xl shadow-lg transition duration-300">

          <i class="fa fa-house mr-2"></i>
          Back to Home

        </a>

        <a href="post-job.html"
          class="w-full sm:w-auto bg-slate-900 hover:bg-slate-800 text-white font-semibold px-8 py-3 rounded-2xl shadow-lg transition duration-300">

          <i class="fa fa-briefcase mr-2"></i>
          Browse Jobs

        </a>

      </div>

      <!-- SMALL TEXT -->
      <p class="text-sm text-slate-400 mt-8">
        Error Code: 404 — Resource Not Found
      </p>

    </div>

  </section>

</body>

</html>

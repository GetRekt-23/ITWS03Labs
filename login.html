<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <title>Login - Jobseeker</title>
</head>

<body class="bg-slate-100 text-slate-800 font-sans antialiased min-h-screen">

  <!-- HEADER -->
  <header class="bg-slate-950 border-b border-slate-800 shadow-lg sticky top-0 z-50">

    <div class="container mx-auto max-w-7xl px-6 py-4 flex justify-between items-center">

      <h1 class="text-3xl font-black tracking-tight">
        <a href="index.html" class="text-indigo-400 hover:text-indigo-300 transition">
          Jobseeker
        </a>
      </h1>

      <nav class="flex items-center gap-4 text-sm font-medium">

        <a href="login.html"
          class="text-white">
          Login
        </a>

        <a href="register.html"
          class="text-slate-300 hover:text-white transition">
          Register
        </a>

        <a href="post-job.html"
          class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl shadow-md transition">
          <i class="fa fa-plus-circle mr-1"></i>
          Post Job
        </a>

      </nav>

    </div>

  </header>

  <!-- MAIN LOGIN SECTION -->
  <section
    class="relative overflow-hidden flex items-center justify-center min-h-[90vh] px-6 py-16 bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950">

    <!-- BACKGROUND GLOW -->
    <div
      class="absolute top-0 left-0 w-96 h-96 bg-indigo-500/20 rounded-full blur-3xl">
    </div>

    <div
      class="absolute bottom-0 right-0 w-96 h-96 bg-indigo-400/10 rounded-full blur-3xl">
    </div>

    <!-- LOGIN CARD -->
    <div
      class="relative z-10 bg-white/95 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">

      <!-- TOP HEADER -->
      <div
        class="bg-gradient-to-r from-slate-950 to-indigo-950 px-8 py-10 text-center">

        <div
          class="w-20 h-20 mx-auto rounded-2xl bg-indigo-500/10 border border-indigo-400/20 flex items-center justify-center mb-5">

          <i class="fa fa-user text-3xl text-indigo-400"></i>

        </div>

        <h2 class="text-4xl font-black text-white">
          Welcome Back
        </h2>

        <p class="text-slate-300 mt-3 text-sm">
          Login to continue your career journey.
        </p>

      </div>

      <!-- FORM -->
      <div class="p-8">

        <!-- MESSAGE EXAMPLES -->
        <!--
        <div class="bg-red-100 text-red-600 border border-red-200 px-4 py-3 rounded-xl mb-5">
          Invalid email or password.
        </div>

        <div class="bg-green-100 text-green-700 border border-green-200 px-4 py-3 rounded-xl mb-5">
          Login successful.
        </div>
        -->

        <form>

          <!-- EMAIL -->
          <div class="mb-5">

            <label class="block text-sm font-semibold text-slate-700 mb-2">
              Email Address
            </label>

            <div class="relative">

              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                <i class="fa fa-envelope"></i>
              </span>

              <input
                type="email"
                name="email"
                placeholder="you@example.com"
                class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
              />

            </div>

          </div>

          <!-- PASSWORD -->
          <div class="mb-6">

            <div class="flex justify-between items-center mb-2">

              <label class="text-sm font-semibold text-slate-700">
                Password
              </label>

              <a href="#"
                class="text-sm text-indigo-600 hover:text-indigo-800 transition">
                Forgot Password?
              </a>

            </div>

            <div class="relative">

              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                <i class="fa fa-lock"></i>
              </span>

              <input
                type="password"
                name="password"
                placeholder="Enter your password"
                class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
              />

            </div>

          </div>

          <!-- REMEMBER -->
          <div class="flex items-center justify-between mb-6">

            <label class="flex items-center text-sm text-slate-600">

              <input
                type="checkbox"
                class="mr-2 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500"
              />

              Remember me

            </label>

          </div>

          <!-- BUTTON -->
          <button
            type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-2xl shadow-lg transition duration-300">

            <i class="fa fa-right-to-bracket mr-2"></i>
            Login

          </button>

          <!-- REGISTER -->
          <p class="mt-6 text-center text-slate-500 text-sm">

            Don't have an account?

            <a href="register.html"
              class="text-indigo-600 hover:text-indigo-800 font-semibold transition">

              Register

            </a>

          </p>

        </form>

      </div>

    </div>

  </section>

</body>

</html>
